<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hospital Management</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        header {
            background: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        nav {
            background: #34495e;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
            font-weight: bold;
        }

        .hero {
            background: #3498db;
            color: white;
            padding: 60px;
            text-align: center;
        }

        .section {
            padding: 40px;
            text-align: center;
        }

        .services {
            display: flex;
            justify-content: space-around;
        }

        .card {
            background: #ecf0f1;
            padding: 20px;
            width: 25%;
            border-radius: 10px;
        }

        form {
            background: #ecf0f1;
            padding: 20px;
            width: 300px;
            margin: auto;
            border-radius: 10px;
        }

        input, textarea {
            width: 100%;
            margin: 10px 0;
            padding: 10px;
        }

        button {
            background: #2ecc71;
            border: none;
            padding: 10px;
            color: white;
            width: 100%;
        }

        footer {
            background: #2c3e50;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

<header>
    <h1>City Hospital</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</nav>

<div class="hero">
    <h2>Your Health, Our Priority</h2>
    <p>Best doctors and services available 24/7</p>
</div>

<div class="section">
    <h2>Our Services</h2>
    <div class="services">
        <div class="card">
            <h3>Cardiology</h3>
            <p>Heart specialist doctors</p>
        </div>

        <div class="card">
            <h3>Neurology</h3>
            <p>Brain & nerve treatment</p>
        </div>

        <div class="card">
            <h3>Orthopedic</h3>
            <p>Bone and joint care</p>
        </div>
    </div>
</div>

<div class="section">
    <h2>Make Appointment</h2>

    <form>
        <input type="text" placeholder="First Name" required>
        <input type="text" placeholder="Last Name" required>
        <input type="tel" placeholder="Phone Number" required>
        <input type="email" placeholder="Email ID" required>
        <textarea placeholder="Message"></textarea>
        <button type="submit">Submit</button>
    </form>
</div>

<footer>
    <p>© 2026 City Hospital | All Rights Reserved</p>
</footer>

</body>
</html>
