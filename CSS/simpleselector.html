<!DOCTYPE html>
<html>
<head>
    <title>CSS Selectors Example</title>

    <style>
        /* 1. Element Selector */
        p {
            color: blue;
        }

        /* 2. Class Selector */
        .box {
            background-color: yellow;
            padding: 10px;
        }

        /* 3. ID Selector */
        #title {
            color: red;
        }

        /* 4. Group Selector */
        h2, h3 {
            color: green;
        }

        /* 5. Universal Selector */
        * {
            font-family: Arial;
        }

        /* 6. Descendant Selector */
        div p {
            color: purple;
        }
    </style>

</head>
<body>

<h1 id="title">Welcome</h1>

<h2>Heading 2</h2>
<h3>Heading 3</h3>

<p>This is normal paragraph</p>

<div class="box">
    <p>This paragraph is inside div (descendant selector)</p>
</div>

</body>
</html>
